---
layout: default
---
<article class="section">
  <div class="container post-body">
    <h1>{{ page.title }}</h1>
    <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
    {{ content }}
    <p><a href="/blog/">&larr; All posts</a></p>
  </div>
</article>
