---
layout: default
title: Blog
---
<section class="section">
  <div class="container">
    <h1 class="section-title">Blog</h1>
    <ul class="post-list">
      {% for post in site.posts %}
      <li>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </div>
</section>
